version: '3.8'
services:
  tradingview-mcp:
    build: .
    image: 'atilaahmet/tradingview-mcp:latest'
    container_name: tradingview-mcp
    restart: unless-stopped
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    # Tambahkan baris di bawah ini untuk mematikan health check Traefik/Docker secara total:
    healthcheck:
      disable: true
